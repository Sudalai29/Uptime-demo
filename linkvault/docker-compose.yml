version: "3.9"

services:

  # ── FastAPI Backend ────────────────────────────────────────
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: linkvault-api
    ports:
      - "8000:8000"
    environment:
      - DYNAMODB_TABLE=linkvault-links
      - AWS_REGION=us-east-1
      - LOCAL_DYNAMO_URL=http://dynamodb-local:8001
      # Fake credentials required by boto3 even for local DynamoDB
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      dynamodb-local:
        condition: service_healthy
    volumes:
      # Hot-reload: mount source so you don't rebuild on every change
      - ./app:/home/appuser/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - linkvault-net

  # ── DynamoDB Local ─────────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: linkvault-dynamodb
    ports:
      - "8001:8001"
    command: "-jar DynamoDBLocal.jar -sharedDb -port 8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - linkvault-net

networks:
  linkvault-net:
    driver: bridge
