# nginx.conf — SSL termination sidecar for ECS Fargate
# Listens on 443, terminates SSL using ACM cert fetched at startup,
# proxies to API on 8000 and Grafana on 3000.
#
# Cert files are fetched from ACM via entrypoint.sh at container startup
# and written to /etc/nginx/certs/

events {
    worker_processes auto;
    worker_connections 1024;
}

http {
    # ── API — api.infradataapp.in ──────────────────────────
    server {
        listen 443 ssl;
        server_name api.infradataapp.in;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://localhost:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 30s;
        }
    }

    # ── Grafana — grafana.infradataapp.in ──────────────────
    server {
        listen 443 ssl;
        server_name grafana.infradataapp.in;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://localhost:3000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 30s;

            # Required for Grafana websockets
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────
    server {
        listen 80;
        server_name api.infradataapp.in grafana.infradataapp.in;
        return 301 https://$host$request_uri;
    }
}
