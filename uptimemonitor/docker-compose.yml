version: "3.9"

services:

  # ── Frontend (React + Vite) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev           # use the dev stage (hot-reload)
    container_name: uptime-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=      # empty = vite proxy handles it
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - api
    networks:
      - uptime-net

  # ── FastAPI Backend ────────────────────────────────────
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: uptime-api
    ports:
      - "8000:8000"
    environment:
      - MONITORS_TABLE=uptime-monitors
      - CHECKS_TABLE=uptime-checks
      - AWS_REGION=us-east-1
      - LOCAL_DYNAMO_URL=http://dynamodb-local:8001
      - LOCAL_MODE=true
      - CHECK_INTERVAL_MINUTES=1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      - dynamodb-local
    volumes:
      - ./app:/home/appuser/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - uptime-net

  # ── DynamoDB Local ─────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: uptime-dynamodb
    ports:
      - "8001:8001"
    command: "-jar DynamoDBLocal.jar -sharedDb -port 8001"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8001 && echo -e 'GET / HTTP/1.0\\r\\n' >&3 && cat <&3 | grep -q 'HTTP' && exit 0 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - uptime-net

networks:
  uptime-net:
    driver: bridge
