name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:    # allows manual trigger from GitHub UI

# Cancel in-progress runs on new push to same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION:       us-east-1
  ECR_API_REPO:     ${{ secrets.ECR_API_REPO }}        # e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/uptime-monitor-prod-api
  ECR_GRAFANA_REPO: ${{ secrets.ECR_GRAFANA_REPO }}    # e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/uptime-monitor-prod-grafana
  ECS_CLUSTER:      ${{ secrets.ECS_CLUSTER }}         # uptime-monitor-prod
  ECS_SERVICE:      ${{ secrets.ECS_SERVICE }}         # uptime-monitor-prod
  S3_BUCKET:        ${{ secrets.S3_BUCKET }}           # uptime-monitor-prod-frontend
  CF_DISTRIBUTION:  ${{ secrets.CF_DISTRIBUTION }}     # E1ABCDEF123456
  IMAGE_TAG:        ${{ github.sha }}

jobs:

  # ── Detect what changed ──────────────────────────────────
  # Avoids running backend jobs on frontend-only changes and vice versa
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      grafana:  ${{ steps.filter.outputs.grafana }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'app/**'
            frontend:
              - 'frontend/**'
            grafana:
              - 'grafana/**'

  # ── Backend tests ────────────────────────────────────────
  test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r app/requirements.txt -r app/requirements-dev.txt

      - name: Run tests
        env:
          LOCAL_MODE: "true"
          AWS_REGION: us-east-1
          MONITORS_TABLE: uptime-monitors
          CHECKS_TABLE: uptime-checks
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
        run: pytest app/ -v --tb=short

  # ── Build & push API image ───────────────────────────────
  build-api:
    needs: [changes, test]
    # Run if backend changed AND test passed (or was skipped because no backend changes)
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker build -t $ECR_API_REPO:$IMAGE_TAG -t $ECR_API_REPO:latest ./app
          docker push $ECR_API_REPO:$IMAGE_TAG
          docker push $ECR_API_REPO:latest

  # ── Build & push Grafana image ───────────────────────────
  build-grafana:
    needs: changes
    if: needs.changes.outputs.grafana == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Grafana image
        run: |
          docker build -t $ECR_GRAFANA_REPO:$IMAGE_TAG -t $ECR_GRAFANA_REPO:latest ./grafana
          docker push $ECR_GRAFANA_REPO:$IMAGE_TAG
          docker push $ECR_GRAFANA_REPO:latest

  # ── Deploy backend to ECS ────────────────────────────────
  deploy-backend:
    needs: [changes, build-api, build-grafana]
    # Run if api or grafana image was just built
    if: |
      always() &&
      (needs.build-api.result == 'success' || needs.build-grafana.result == 'success')
    runs-on: ubuntu-latest
    environment: production    # requires manual approval in GitHub if configured

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment

      - name: Wait for ECS service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
        timeout-minutes: 10

      - name: Confirm deployment
        run: |
          RUNNING=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query "services[0].runningCount" \
            --output text)
          echo "Running tasks: $RUNNING"
          if [ "$RUNNING" -lt "1" ]; then
            echo "No running tasks after deploy — deployment may have failed"
            exit 1
          fi

  # ── Build frontend ───────────────────────────────────────
  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL:     ${{ secrets.VITE_API_URL }}      # https://api.infradataapp.in
          VITE_GRAFANA_URL: ${{ secrets.VITE_GRAFANA_URL }}  # https://grafana.infradataapp.in
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── Deploy frontend to S3 + CloudFront ──────────────────
  deploy-frontend:
    needs: build-frontend
    if: needs.build-frontend.result == 'success'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Sync to S3
        run: |
          # Long cache for hashed assets (JS/CSS bundles)
          aws s3 sync dist/ s3://$S3_BUCKET \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # No cache for index.html — always fresh
          aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_DISTRIBUTION \
            --paths "/*"
