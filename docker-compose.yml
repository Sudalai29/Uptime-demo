version: "3.9"

# ── Local dev stack ────────────────────────────────────────
# Starts: frontend, api, dynamodb-local, grafana
# Prometheus has been removed — prod uses CloudWatch instead.
# Grafana in dev uses CloudWatch datasource (reads from real AWS if
# AWS credentials are present, or shows empty panels locally).
#
# Start:      docker-compose up --build
# Reset data: docker-compose down -v && docker-compose up --build

services:

  # ── Frontend (React + Vite) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: uptime-frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - api
    networks:
      - uptime-net

  # ── FastAPI Backend ────────────────────────────────────
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: uptime-api
    ports:
      - "8000:8000"
    environment:
      - MONITORS_TABLE=uptime-monitors
      - CHECKS_TABLE=uptime-checks
      - AWS_REGION=us-east-1
      - LOCAL_DYNAMO_URL=http://dynamodb-local:8001
      - LOCAL_MODE=true
      - CHECK_INTERVAL_MINUTES=1
      # Dev-only dummy credentials for DynamoDB Local
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      # SNS and ALLOWED_ORIGINS not set in dev — see app/.env.example
    depends_on:
      - dynamodb-local
    volumes:
      - ./app:/home/appuser/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - uptime-net

  # ── DynamoDB Local ─────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: uptime-dynamodb
    ports:
      - "8001:8001"
    command: "-jar DynamoDBLocal.jar -sharedDb -port 8001"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8001 && echo -e 'GET / HTTP/1.0\\r\\n' >&3 && cat <&3 | grep -q 'HTTP' && exit 0 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - uptime-net

  # ── Grafana ────────────────────────────────────────────
  # Datasource: CloudWatch (queries real AWS metrics in prod).
  # In local dev, CloudWatch panels show "no data" unless you provide
  # real AWS credentials via environment variables below.
  # To test Grafana locally with real data:
  #   1. Set AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY below (use a read-only key)
  #   2. Run docker-compose up grafana
  grafana:
    image: grafana/grafana:10.2.3          # pinned — avoid surprise upgrades
    container_name: uptime-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=changeme-in-prod   # override via env in prod ECS task

      # Anonymous viewer access — anyone visiting :3001 gets read-only dashboard
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_BASIC_ENABLED=true
      - GF_USERS_VIEWERS_CAN_EDIT=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false   # login still available for admin at /login
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/uptime-monitor.json

      # CloudWatch datasource auth — in prod use ECS task IAM role (no keys needed).
      # In local dev, provide real read-only AWS credentials here to see live data.
      # Leave blank to run Grafana locally with empty CloudWatch panels.
      - GF_AWS_DEFAULT_REGION=us-east-1
      # - AWS_ACCESS_KEY_ID=your-read-only-key      # uncomment for local CW testing
      # - AWS_SECRET_ACCESS_KEY=your-secret-key     # uncomment for local CW testing

    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - uptime-net

volumes:
  grafana-data:

networks:
  uptime-net:
    driver: bridge
